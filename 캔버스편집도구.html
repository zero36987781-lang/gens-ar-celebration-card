<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Pro Appearance Studio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-main: #F2F2F7;
            --panel-bg: #FFFFFF;
            --item-bg: #F2F2F7;
            --text-primary: #1C1C1E;
            --text-gray: #8E8E93;
            --accent: #007AFF;
            --border: #E5E5EA;
            --font-main: 'Pretendard', -apple-system, sans-serif;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: #D1D1D6; font-family: var(--font-main); display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--text-primary); }

        .phone {
            width: 100%; max-width: 390px; height: 100%; max-height: 844px;
            background: var(--bg-main); position: relative; overflow: hidden; display: flex; flex-direction: column;
            border-radius: 44px; border: 8px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        /* 1. Resizable Preview Area */
        .preview-container {
            position: relative; background: white; min-height: 150px; height: 40%;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            border-bottom: 1px solid var(--border); transition: height 0.1s;
        }
        #targetWrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #targetText { font-size: 36px; font-weight: 900; text-align: center; line-height: 1.1; letter-spacing: -0.05em; padding: 20px; }
        
        .resize-handle {
            position: absolute; bottom: 0; width: 100%; height: 12px; cursor: ns-resize;
            display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.03);
        }
        .resize-handle::after { content: ''; width: 30px; height: 4px; background: #C7C7CC; border-radius: 2px; }

        /* 2. Editor Panel */
        .editor { flex: 1; background: var(--panel-bg); display: flex; flex-direction: column; overflow-y: auto; }
        
        /* Object Selector (Fill/Stroke/BG) */
        .obj-selector { display: flex; padding: 15px 20px; gap: 10px; border-bottom: 1px solid var(--border); }
        .obj-btn { 
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); 
            font-size: 11px; font-weight: 800; text-align: center; cursor: pointer; color: var(--text-gray);
        }
        .obj-btn.active { background: var(--text-primary); color: white; border-color: var(--text-primary); }

        /* Tabs & Sections */
        .tabs { display: flex; padding: 10px 20px; gap: 15px; }
        .tab { font-size: 13px; font-weight: 700; color: var(--text-gray); cursor: pointer; position: relative; padding-bottom: 4px; }
        .tab.active { color: var(--text-primary); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--text-primary); }

        .section { display: none; padding: 0 20px 20px; flex-direction: column; gap: 15px; }
        .section.active { display: flex; }

        /* Gradient Engine */
        .grad-track { height: 40px; border-radius: 10px; border: 1px solid var(--border); position: relative; cursor: copy; margin-top: 10px; }
        .stop-handle {
            position: absolute; top: 44px; width: 20px; height: 20px; background: white;
            border: 3px solid var(--text-primary); border-radius: 50%; transform: translateX(-50%); cursor: grab;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Common UI */
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .swatch { aspect-ratio: 1; border-radius: 8px; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .swatch.selected { outline: 2px solid var(--text-primary); outline-offset: 2px; }
        
        .harmony-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .harmony-box { height: 50px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }

        .label { font-size: 10px; font-weight: 800; color: var(--text-gray); text-transform: uppercase; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--text-primary); }
        .btn-apply { background: var(--text-primary); color: white; border: none; padding: 18px; font-weight: 900; font-size: 14px; cursor: pointer; margin-top: auto; }
    </style>
</head>
<body>

<div class="phone">
    <div class="preview-container" id="previewArea">
        <div id="targetWrapper">
            <div id="targetText">DESIGN<br>STUDIO</div>
        </div>
        <div class="resize-handle" id="resizer"></div>
    </div>

    <div class="editor">
        <div class="obj-selector">
            <div class="obj-btn active" onclick="setMode('fill')">FILL</div>
            <div class="obj-btn" onclick="setMode('stroke')">STROKE</div>
            <div class="obj-btn" onclick="setMode('bg')">BACKGROUND</div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(0)">SOLID</div>
            <div class="tab" onclick="switchTab(1)">GRADIENT</div>
            <div class="tab" onclick="switchTab(2)">HARMONY</div>
        </div>

        <div id="sec0" class="section active">
            <div class="label">Pro Swatches</div>
            <div class="grid" id="solidGrid"></div>
        </div>

        <div id="sec1" class="section">
            <div class="label">Tap track to add, drag to move</div>
            <div id="gradTrack" class="grad-track" onclick="addStop(event)"></div>
            <div id="stopContainer" style="position:relative; height:60px;"></div>
            
            <div id="stopSettings" style="display:none">
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="color" id="stopColorInput" oninput="updateStopColor(this.value)">
                    <button onclick="deleteStop()" style="font-size:10px; background:#FF3B30; color:white; border:none; padding:5px 10px; border-radius:5px;">REMOVE</button>
                    <div style="flex:1"></div>
                    <span class="label">Angle: <span id="angVal">135</span>°</span>
                </div>
                <input type="range" id="angRange" min="0" max="360" value="135" oninput="applyAll()">
            </div>
        </div>

        <div id="sec2" class="section">
            <div class="label">Base Color Selection</div>
            <div class="grid" id="palGrid"></div>
            <div class="label">Calculated Harmony</div>
            <div class="harmony-row" id="harmonyArea"></div>
        </div>

        <button class="btn-apply" onclick="alert('Configuration Saved')">SAVE APPEARANCE</button>
    </div>
</div>

<script>
    const colors = ['#FF3B30', '#FF9500', '#FFCC00', '#34C759', '#007AFF', '#5856D6', '#AF52DE', '#FF2D55', '#FFFFFF', '#1C1C1E', '#8E8E93', '#C7C7CC'];
    let state = {
        mode: 'fill', // fill, stroke, bg
        fill: { type: 'solid', color: '#1C1C1E', stops: [] },
        stroke: { type: 'solid', color: 'transparent', stops: [] },
        bg: { type: 'solid', color: '#FFFFFF', stops: [] },
        gradientStops: [
            { id: 1, pos: 0, color: '#007AFF' },
            { id: 2, pos: 100, color: '#AF52DE' }
        ],
        activeStop: null
    };

    function init() {
        const sGrid = document.getElementById('solidGrid');
        const pGrid = document.getElementById('palGrid');
        colors.forEach(c => {
            sGrid.appendChild(createSwatch(c, (col) => {
                state[state.mode].type = 'solid';
                state[state.mode].color = col;
                applyAll();
            }));
            pGrid.appendChild(createSwatch(c, (col) => genHarmony(col)));
        });
        setupResizer();
        renderStops();
        applyAll();
    }

    function setMode(m) {
        state.mode = m;
        document.querySelectorAll('.obj-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === m));
    }

    function switchTab(idx) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
        if(idx === 1) state[state.mode].type = 'gradient';
        applyAll();
    }

    function createSwatch(color, cb) {
        const d = document.createElement('div');
        d.className = 'swatch'; d.style.backgroundColor = color;
        d.onclick = () => { cb(color); document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected')); d.classList.add('selected'); };
        return d;
    }

    /* --- Gradient Logic --- */
    function addStop(e) {
        const r = document.getElementById('gradTrack').getBoundingClientRect();
        const pos = Math.round(((e.clientX - r.left) / r.width) * 100);
        const newStop = { id: Date.now(), pos: pos, color: '#8E8E93' };
        state.gradientStops.push(newStop);
        state.activeStop = newStop.id;
        renderStops(); applyAll();
    }

    function renderStops() {
        const cont = document.getElementById('stopContainer');
        cont.innerHTML = '';
        state.gradientStops.forEach(s => {
            const h = document.createElement('div');
            h.className = 'stop-handle'; h.style.left = s.pos + '%';
            if(s.id === state.activeStop) h.style.borderColor = '#007AFF';
            
            h.onmousedown = (e) => {
                state.activeStop = s.id;
                document.getElementById('stopSettings').style.display = 'block';
                document.getElementById('stopColorInput').value = s.color;
                
                const move = (m) => {
                    const r = document.getElementById('gradTrack').getBoundingClientRect();
                    s.pos = Math.max(0, Math.min(100, Math.round(((m.clientX - r.left) / r.width) * 100)));
                    renderStops(); applyAll();
                };
                const up = () => { window.removeEventListener('mousemove', move); };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
            };
            cont.appendChild(h);
        });
    }

    function updateStopColor(val) {
        const s = state.gradientStops.find(x => x.id === state.activeStop);
        if(s) { s.color = val; applyAll(); }
    }

    function deleteStop() {
        if(state.gradientStops.length <= 2) return;
        state.gradientStops = state.gradientStops.filter(x => x.id !== state.activeStop);
        state.activeStop = null;
        renderStops(); applyAll();
    }

    /* --- Core Application Logic --- */
    function applyAll() {
        const txt = document.getElementById('targetText');
        const bg = document.getElementById('targetWrapper');
        const ang = document.getElementById('angRange').value;
        document.getElementById('angVal').innerText = ang;

        const gradStr = () => {
            const sorted = [...state.gradientStops].sort((a,b) => a.pos - b.pos);
            return `linear-gradient(${ang}deg, ${sorted.map(s => `${s.color} ${s.pos}%`).join(', ')})`;
        };

        // 1. Background
        if(state.bg.type === 'solid') bg.style.background = state.bg.color;
        else bg.style.background = gradStr();

        // 2. Fill (Text Color)
        if(state.fill.type === 'solid') {
            txt.style.webkitTextFillColor = state.fill.color;
            txt.style.background = 'none';
        } else {
            txt.style.background = gradStr();
            txt.style.webkitBackgroundClip = 'text';
            txt.style.webkitTextFillColor = 'transparent';
        }

        // 3. Stroke
        if(state.stroke.type === 'solid') txt.style.webkitTextStroke = `1.5px ${state.stroke.color}`;
        else txt.style.webkitTextStroke = `1.5px ${state.gradientStops[0].color}`;

        document.getElementById('gradTrack').style.background = `linear-gradient(90deg, ${[...state.gradientStops].sort((a,b)=>a.pos-b.pos).map(s=>`${s.color} ${s.pos}%`).join(',')})`;
    }

    function genHarmony(hex) {
        state[state.mode].type = 'solid';
        state[state.mode].color = hex;
        applyAll();

        const area = document.getElementById('harmonyArea');
        area.innerHTML = '';
        const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        const tones = [`rgb(${255-r},${255-g},${255-b})`, `rgb(${g},${b},${r})`, `rgb(${b},${r},${g})`, `rgba(${r},${g},${b},0.4)`];
        tones.forEach(t => {
            const box = document.createElement('div');
            box.className = 'harmony-box'; box.style.backgroundColor = t;
            box.onclick = () => { state[state.mode].color = t; applyAll(); };
            area.appendChild(box);
        });
    }

    function setupResizer() {
        const resizer = document.getElementById('resizer');
        const preview = document.getElementById('previewArea');
        resizer.onmousedown = (e) => {
            const startY = e.clientY;
            const startH = preview.offsetHeight;
            const move = (m) => { preview.style.height = (startH + (m.clientY - startY)) + 'px'; };
            const up = () => { window.removeEventListener('mousemove', move); };
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', up);
        };
    }

    init();
</script>
</body>
</html>

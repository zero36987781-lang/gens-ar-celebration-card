<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>CHARIEL — Admin Studio</title>
  <meta name="title" content="CHARIEL — Admin Studio" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./css/shared.css" />
  <link rel="stylesheet" href="./css/admin.css" />
  <link rel="stylesheet" href="./css/card-editor.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand-mark">C</div>
      <div class="brand-block">
        <div class="brand">CHARIEL</div>
        <div class="brand-sub">Admin Studio</div>
      </div>
    </div>
    <span class="ghost-link">Private editor</span>
  </header>

  <main class="admin-shell">
    <section class="card-panel admin-auth">
      <span class="eyebrow">CHARIEL STANDARD</span>
      <h1>Admin access & live edit</h1>
      <p>Sign in for live data or use demo mode.</p>
      <form id="admin-login" class="stack-form compact-auth">
        <div class="field-grid two-up">
          <label class="glass-field">
            <span>Email</span>
            <input id="admin-email" type="email" placeholder="admin@example.com" />
          </label>
          <label class="glass-field">
            <span>Password</span>
            <input id="admin-password" type="password" placeholder="••••••••" />
          </label>
        </div>
        <div class="inline-actions">
          <button class="btn btn-primary" type="submit">Sign in</button>
          <button id="demo-admin" class="btn btn-secondary" type="button">Demo mode</button>
        </div>
      </form>
      <div id="admin-auth-status" class="status-box muted">Waiting for runtime config.</div>
    </section>

    <section id="admin-editor" class="card-panel hidden">
      <div class="field-grid two-up hero-names">
        <label class="glass-field">
          <span>Receiver</span>
          <input id="admin-recipient-name" type="text" maxlength="40" placeholder="Emma" />
        </label>
        <label class="glass-field">
          <span>Sender</span>
          <input id="admin-sender-name" type="text" maxlength="30" placeholder="Minji" />
        </label>
      </div>
      <div class="field-grid two-up">
        <label class="glass-field">
          <span>Gift slug</span>
          <input id="admin-slug" type="text" placeholder="gift-abc123" />
        </label>
        <label class="glass-field">
          <span>Template</span>
          <select id="admin-template"></select>
        </label>
      </div>
      <div class="inline-actions admin-actions-row">
        <button id="admin-load" class="btn btn-secondary" type="button">Load</button>
        <button id="admin-save" class="btn btn-primary" type="button">Save</button>
      </div>
      <div id="admin-save-status" class="status-box muted">Signed in editors can update gifts here.</div>
    </section>

    <section id="recent-gifts" class="card-panel hidden">
      <div class="section-head">
        <span class="step">LIST</span>
        <div>
          <h2>Recent gifts</h2>
          <p>Load a saved slug with one tap.</p>
        </div>
      </div>
      <div id="gift-list" class="gift-list"></div>
    </section>
  </main>

  <script type="module" src="./js/admin/app.js"></script>
</body>
</html>
